<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>jojoa - 관리자</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet"/>
<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.js"></script>
<style>
  :root {
    --bg: #0a0a0f;
    --bg2: #111118;
    --bg3: #16161f;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.13);
    --text: #f0f0f5;
    --text2: #8888a0;
    --text3: #55556a;
    --accent: #7b6ef6;
    --accent2: #a78bfa;
    --accent3: #34d399;
    --red: #f87171;
    --amber: #fbbf24;
  }
  
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* 로그인 화면 */
  .login-screen {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem;
  }
  
  .login-box {
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: 16px;
    padding: 3rem;
    width: 100%;
    max-width: 420px;
    text-align: center;
  }
  
  .login-title {
    font-family: 'DM Serif Display', serif;
    font-size: 36px;
    color: var(--text);
    margin-bottom: 0.5rem;
  }
  
  .login-subtitle {
    font-size: 14px;
    color: var(--text3);
    margin-bottom: 2rem;
  }
  
  .login-form {
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }
  
  .login-input {
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: 10px;
    padding: 14px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--text);
    transition: border-color 0.2s;
  }
  
  .login-input:focus {
    outline: none;
    border-color: var(--accent);
  }
  
  .login-btn {
    background: var(--accent);
    color: white;
    border: none;
    padding: 14px;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
    margin-top: 0.5rem;
  }
  
  .login-btn:hover {
    background: var(--accent2);
  }

  /* 관리자 대시보드 */
  .admin-container {
    display: none;
    min-height: 100vh;
  }
  
  .admin-header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 1rem 2rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  
  .admin-logo {
    font-family: 'DM Serif Display', serif;
    font-size: 24px;
    color: var(--text);
  }
  
  .admin-user {
    display: flex;
    align-items: center;
    gap: 1rem;
  }
  
  .logout-btn {
    background: var(--bg3);
    border: 1px solid var(--border2);
    color: var(--text2);
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
  }
  
  .logout-btn:hover {
    color: var(--text);
    border-color: var(--accent2);
  }
  
  .admin-content {
    display: flex;
  }
  
  /* 사이드바 */
  .sidebar {
    width: 250px;
    background: var(--bg2);
    border-right: 1px solid var(--border);
    min-height: calc(100vh - 57px);
    padding: 2rem 0;
  }
  
  .sidebar-item {
    padding: 12px 2rem;
    color: var(--text2);
    cursor: pointer;
    transition: all 0.2s;
    font-size: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  
  .sidebar-item:hover {
    background: var(--bg3);
    color: var(--text);
  }
  
  .sidebar-item.active {
    background: rgba(123,110,246,0.1);
    color: var(--accent2);
    border-left: 3px solid var(--accent);
  }
  
  /* 메인 영역 */
  .main-area {
    flex: 1;
    padding: 2rem;
    max-width: 1400px;
  }
  
  .page-title {
    font-family: 'DM Serif Display', serif;
    font-size: 32px;
    color: var(--text);
    margin-bottom: 2rem;
  }
  
  /* 통계 카드 */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 1.5rem;
    margin-bottom: 2rem;
  }
  
  .stat-card {
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: 12px;
    padding: 1.5rem;
  }
  
  .stat-label {
    font-size: 12px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 0.5rem;
  }
  
  .stat-value {
    font-size: 36px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 0.5rem;
  }
  
  .stat-change {
    font-size: 12px;
    color: var(--accent3);
  }
  
  .stat-change.negative {
    color: var(--red);
  }
  
  /* 차트 */
  .chart-container {
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: 12px;
    padding: 1.5rem;
    margin-bottom: 2rem;
  }
  
  .chart-title {
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 1.5rem;
  }
  
  /* 테이블 */
  .data-table {
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: 12px;
    overflow: hidden;
  }
  
  .table-header {
    padding: 1rem 1.5rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  
  .table-title {
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
  }
  
  .search-box {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 13px;
    color: var(--text);
    width: 200px;
  }
  
  .search-box:focus {
    outline: none;
    border-color: var(--accent);
  }
  
  table {
    width: 100%;
    border-collapse: collapse;
  }
  
  thead {
    background: var(--bg3);
  }
  
  th {
    padding: 12px 1.5rem;
    text-align: left;
    font-size: 12px;
    font-weight: 600;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  
  td {
    padding: 12px 1.5rem;
    border-top: 1px solid var(--border);
    font-size: 14px;
    color: var(--text2);
  }
  
  tr:hover {
    background: var(--bg3);
  }
  
  .user-avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-weight: 700;
    font-size: 14px;
  }
  
  .badge {
    display: inline-block;
    padding: 4px 10px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 600;
  }
  
  .badge-active {
    background: rgba(52,211,153,0.15);
    color: var(--accent3);
  }
  
  .badge-inactive {
    background: rgba(136,136,160,0.15);
    color: var(--text3);
  }
  
  .action-btn {
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text3);
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
    margin-right: 6px;
  }
  
  .action-btn:hover {
    color: var(--text);
    border-color: var(--accent2);
  }
  
  .action-btn.danger:hover {
    color: var(--red);
    border-color: var(--red);
  }
  
  /* 추천 단축키 그리드 */
  .shortcuts-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 1rem;
    margin-top: 1rem;
  }
  
  .shortcut-card {
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: 10px;
    padding: 1.5rem;
    text-align: center;
    position: relative;
  }
  
  .shortcut-icon-preview {
    width: 48px;
    height: 48px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    margin: 0 auto 1rem;
  }
  
  .shortcut-name {
    font-weight: 600;
    color: var(--text);
    margin-bottom: 0.5rem;
  }
  
  .shortcut-url {
    font-size: 11px;
    color: var(--text3);
    word-break: break-all;
  }
  
  .shortcut-actions {
    display: flex;
    gap: 6px;
    justify-content: center;
    margin-top: 1rem;
  }
  
  /* 페이지 숨김 */
  .page {
    display: none;
  }
  
  .page.active {
    display: block;
  }
  
  /* 추가 버튼 */
  .add-btn {
    background: var(--accent);
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
  }
  
  .add-btn:hover {
    background: var(--accent2);
  }

  /* 빈 상태 */
  .empty-state {
    text-align: center;
    padding: 4rem 2rem;
  }
  
  .empty-icon {
    font-size: 64px;
    margin-bottom: 1rem;
    opacity: 0.3;
  }
  
  .empty-text {
    color: var(--text3);
    font-size: 14px;
  }
</style>
</head>
<body>

<!-- 로그인 화면 -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <h1 class="login-title">🔧 관리자</h1>
    <p class="login-subtitle">jojoa 관리자 페이지에 오신 것을 환영합니다</p>
    <form class="login-form" onsubmit="handleAdminLogin(event)">
      <input type="email" class="login-input" placeholder="관리자 이메일" required>
      <input type="password" class="login-input" placeholder="비밀번호" required>
      <button type="submit" class="login-btn">로그인</button>
    </form>
  </div>
</div>

<!-- 관리자 대시보드 -->
<div class="admin-container" id="adminContainer">
  <!-- 헤더 -->
  <div class="admin-header">
    <div class="admin-logo">jo<span style="color:var(--accent2);">jo</span>a 관리자</div>
    <div class="admin-user">
      <span id="adminEmail" style="font-size:13px;color:var(--text3);"></span>
      <button class="logout-btn" onclick="handleLogout()">로그아웃</button>
    </div>
  </div>

  <div class="admin-content">
    <!-- 사이드바 -->
    <div class="sidebar">
      <div class="sidebar-item active" onclick="showPage('dashboard')">
        📊 대시보드
      </div>
      <div class="sidebar-item" onclick="showPage('users')">
        👥 회원 관리
      </div>
      <div class="sidebar-item" onclick="showPage('shortcuts')">
        🔖 추천 단축키
      </div>
      <div class="sidebar-item" onclick="showPage('logs')">
        📋 활동 로그
      </div>
    </div>

    <!-- 메인 영역 -->
    <div class="main-area">
      <!-- 대시보드 페이지 -->
      <div class="page active" id="dashboard">
        <h1 class="page-title">대시보드</h1>
        
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-label">총 회원 수</div>
            <div class="stat-value" id="totalUsers">0</div>
            <div class="stat-change">+0 이번 주</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">활성 사용자</div>
            <div class="stat-value" id="activeUsers">0</div>
            <div class="stat-change">지난 7일</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">총 단축키</div>
            <div class="stat-value" id="totalShortcuts">0</div>
            <div class="stat-change">+0 이번 주</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">추천 단축키</div>
            <div class="stat-value" id="suggestedCount">7</div>
            <div class="stat-change">관리 중</div>
          </div>
        </div>

        <div class="chart-container">
          <div class="chart-title">회원 가입 추이</div>
          <canvas id="signupChart"></canvas>
        </div>

        <div class="chart-container">
          <div class="chart-title">인기 단축키 TOP 10</div>
          <canvas id="popularChart"></canvas>
        </div>
      </div>

      <!-- 회원 관리 페이지 -->
      <div class="page" id="users">
        <h1 class="page-title">회원 관리</h1>
        
        <div class="data-table">
          <div class="table-header">
            <div class="table-title">전체 회원</div>
            <input type="text" class="search-box" placeholder="검색..." onkeyup="searchUsers(this.value)">
          </div>
          <table>
            <thead>
              <tr>
                <th>회원</th>
                <th>이메일</th>
                <th>가입일</th>
                <th>단축키</th>
                <th>상태</th>
                <th>작업</th>
              </tr>
            </thead>
            <tbody id="usersTableBody">
              <tr>
                <td colspan="6">
                  <div class="empty-state">
                    <div class="empty-icon">👥</div>
                    <div class="empty-text">등록된 회원이 없습니다</div>
                  </div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- 추천 단축키 페이지 -->
      <div class="page" id="shortcuts">
        <h1 class="page-title">추천 단축키 관리</h1>
        
        <div style="margin-bottom:2rem;">
          <button class="add-btn" onclick="showAddShortcutForm()">+ 새 단축키 추가</button>
        </div>

        <div class="shortcuts-grid" id="shortcutsGrid"></div>
      </div>

      <!-- 활동 로그 페이지 -->
      <div class="page" id="logs">
        <h1 class="page-title">활동 로그</h1>
        
        <div class="data-table">
          <div class="table-header">
            <div class="table-title">최근 활동</div>
          </div>
          <table>
            <thead>
              <tr>
                <th>시간</th>
                <th>사용자</th>
                <th>활동</th>
                <th>상세</th>
              </tr>
            </thead>
            <tbody id="logsTableBody">
              <tr>
                <td colspan="4">
                  <div class="empty-state">
                    <div class="empty-icon">📋</div>
                    <div class="empty-text">활동 로그가 없습니다</div>
                  </div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// Firebase 설정 (데모용)
const firebaseConfig = {
apiKey: "AIzaSyDaoaW5lGKXxJi-CVlWrj92itUf440R_MU",
  authDomain: "jojoa-2b05f.firebaseapp.com",
  projectId: "jojoa-2b05f",
  storageBucket: "jojoa-2b05f.firebasestorage.app",
  messagingSenderId: "204831169873",
  appId: "1:204831169873:web:c88ffa91b8988e7de0c770",
  measurementId: "G-KEFR8EYP0R"
};
let app, auth, db;
let currentAdmin = null;

// Firebase 초기화
try {
  app = firebase.initializeApp(firebaseConfig);
  auth = firebase.auth();
  db = firebase.firestore();
  
  auth.onAuthStateChanged((user) => {
    if (user) {
      checkAdminAccess(user);
    }
  });
} catch (error) {
  console.log('Firebase 초기화 실패 (데모 모드)');
}

// 관리자 로그인
function handleAdminLogin(e) {
  e.preventDefault();
  const form = e.target;
  const email = form[0].value;
  const password = form[1].value;
  
  if (!auth) {
    alert('⚠️ Firebase가 설정되지 않았습니다.\n\n데모 모드로 진입합니다.');
    showDemoMode(email);
    return;
  }
  
  auth.signInWithEmailAndPassword(email, password)
    .then((userCredential) => {
      checkAdminAccess(userCredential.user);
    })
    .catch((error) => {
      alert('로그인 실패: ' + error.message);
    });
}

// 관리자 권한 확인
function checkAdminAccess(user) {
  // 실제 환경에서는 Firestore에서 관리자 권한 확인
  // 데모에서는 모든 로그인 사용자를 관리자로 처리
  currentAdmin = user;
  document.getElementById('adminEmail').textContent = user.email;
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('adminContainer').style.display = 'block';
  loadDashboard();
}

// 데모 모드
function showDemoMode(email) {
  currentAdmin = { email: email, displayName: '데모 관리자' };
  document.getElementById('adminEmail').textContent = email;
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('adminContainer').style.display = 'block';
  loadDemoData();
}

// 로그아웃
function handleLogout() {
  if (confirm('로그아웃 하시겠습니까?')) {
    if (auth) {
      auth.signOut();
    }
    location.reload();
  }
}

// 페이지 전환
function showPage(pageId) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
  
  document.getElementById(pageId).classList.add('active');
  event.target.classList.add('active');
  
  if (pageId === 'dashboard') loadDashboard();
  if (pageId === 'users') loadUsers();
  if (pageId === 'shortcuts') loadShortcuts();
  if (pageId === 'logs') loadLogs();
}

// 대시보드 로드
function loadDashboard() {
  if (!db) {
    loadDemoData();
    return;
  }
  
  // 실제 데이터 로드
  db.collection('users').get().then(snapshot => {
    document.getElementById('totalUsers').textContent = snapshot.size;
  });
}

// 데모 데이터 로드
function loadDemoData() {
  // 통계
  document.getElementById('totalUsers').textContent = '24';
  document.getElementById('activeUsers').textContent = '18';
  document.getElementById('totalShortcuts').textContent = '156';
  
  // 차트
  createSignupChart();
  createPopularChart();
  
  // 추천 단축키
  loadDemoShortcuts();
}

// 회원 가입 추이 차트
function createSignupChart() {
  const ctx = document.getElementById('signupChart');
  new Chart(ctx, {
    type: 'line',
    data: {
      labels: ['1월', '2월', '3월', '4월', '5월', '6월'],
      datasets: [{
        label: '신규 가입',
        data: [3, 5, 8, 12, 18, 24],
        borderColor: '#7b6ef6',
        backgroundColor: 'rgba(123,110,246,0.1)',
        tension: 0.4
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { display: false }
      },
      scales: {
        y: { 
          beginAtZero: true,
          grid: { color: 'rgba(255,255,255,0.05)' },
          ticks: { color: '#8888a0' }
        },
        x: {
          grid: { color: 'rgba(255,255,255,0.05)' },
          ticks: { color: '#8888a0' }
        }
      }
    }
  });
}

// 인기 단축키 차트
function createPopularChart() {
  const ctx = document.getElementById('popularChart');
  new Chart(ctx, {
    type: 'bar',
    data: {
      labels: ['네이버', '유튜브', 'ChatGPT', '구글', '인스타', '틱톡', 'Claude'],
      datasets: [{
        label: '사용 횟수',
        data: [89, 76, 64, 58, 45, 38, 32],
        backgroundColor: '#7b6ef6'
      }]
    },

function loadDemoShortcuts() {
  const grid = document.getElementById('shortcutsGrid');
  const shortcuts = [
    { name: '네이버', icon: 'N', color: '#03C75A', isText: true },
    { name: '유튜브', icon: '▶', color: '#FF0000', isText: true },
    { name: 'ChatGPT', icon: '💬', color: '#10A37F' },
    { name: 'Claude', icon: '🤖', color: '#CC9B7A' },
    { name: '조조아', icon: '🐾', color: 'linear-gradient(135deg, #FF6B9D, #FFA07A)' }
  ];
  
  grid.innerHTML = shortcuts.map((s, i) => `
    <div class="shortcut-card">
      <div class="shortcut-icon-preview" style="background:${s.color}">
        <span style="color:white;font-size:${s.isText ? '20px' : '24px'};font-weight:${s.isText ? 'bold' : 'normal'}">${s.icon}</span>
      </div>
      <div class="shortcut-name">${s.name}</div>
      <div class="shortcut-url">사용자 ${Math.floor(Math.random() * 20 + 5)}명</div>
      <div class="shortcut-actions">
        <button class="action-btn">수정</button>
        <button class="action-btn danger">삭제</button>
      </div>
    </div>
  `).join('');
}
